body{background:#1a1125;color:#f0e6f6;font-family:Pretendard,-apple-system,sans-serif;font-size:15px;line-height:1.5;min-height:100dvh;overflow-x:hidden}

.pl{font-size:11px;color:#a78bbc;background:rgba(168,85,247,.08);padding:2px 10px;border-radius:99px;display:inline-block}

var MONS=[{name:'슬라임',hp:50,svg:'<circle cx="50" cy="55" r="32" fill="#f9a8d4"/><circle cx="38" cy="48" r="5" fill="#fff"/><circle cx="62" cy="48" r="5" fill="#fff"/><circle cx="40" cy="49" r="2.5" fill="#1a1125"/><circle cx="64" cy="49" r="2.5" fill="#1a1125"/><path d="M40 64Q50 70 60 64" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>'},{name:'고블린',hp:65,svg:'<ellipse cx="50" cy="55" rx="30" ry="32" fill="#c084fc"/><polygon points="32,28 38,45 26,42" fill="#c084fc"/><polygon points="68,28 74,42 62,45" fill="#c084fc"/><circle cx="40" cy="50" r="5" fill="#fff"/><circle cx="60" cy="50" r="5" fill="#fff"/><circle cx="41" cy="51" r="2.5" fill="#1a1125"/><circle cx="61" cy="51" r="2.5" fill="#1a1125"/>'},{name:'드래곤',hp:90,svg:'<ellipse cx="50" cy="55" rx="36" ry="32" fill="#a78bfa"/><polygon points="22,30 14,10 36,35" fill="#a78bfa"/><polygon points="78,30 86,10 64,35" fill="#a78bfa"/><circle cx="38" cy="48" r="6" fill="#fff"/><circle cx="62" cy="48" r="6" fill="#fff"/><circle cx="39" cy="49" r="3" fill="#1a1125"/><circle cx="63" cy="49" r="3" fill="#1a1125"/><path d="M38 66Q50 74 62 66" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>'},{name:'유령',hp:45,svg:'<path d="M50 18C28 18 20 38 20 55Q20 75 28 80L34 74 40 80 46 74 50 80 54 74 60 80 66 74 72 80Q80 75 80 55C80 38 72 18 50 18Z" fill="#e879f9"/><circle cx="40" cy="45" r="5" fill="#fff"/><circle cx="60" cy="45" r="5" fill="#fff"/><circle cx="41" cy="46" r="2.5" fill="#1a1125"/><circle cx="61" cy="46" r="2.5" fill="#1a1125"/><ellipse cx="50" cy="60" rx="5" ry="6" fill="#1a1125"/>'},{name:'오크',hp:75,svg:'<ellipse cx="50" cy="55" rx="34" ry="32" fill="#fb923c"/><rect x="32" y="38" width="36" height="8" rx="3" fill="#7c2d12"/><circle cx="40" cy="48" r="5" fill="#fff"/><circle cx="60" cy="48" r="5" fill="#fff"/><circle cx="41" cy="49" r="2.5" fill="#1a1125"/><circle cx="61" cy="49" r="2.5" fill="#1a1125"/>'}];
var BOSS={name:'마왕 낭비',hp:300,svg:'<ellipse cx="50" cy="50" rx="40" ry="38" fill="#be185d"/><polygon points="22,22 12,2 36,28" fill="#be185d"/><polygon points="78,22 88,2 64,28" fill="#be185d"/><circle cx="38" cy="42" r="7" fill="#fbbf24"/><circle cx="62" cy="42" r="7" fill="#fbbf24"/><circle cx="39" cy="43" r="3.5" fill="#1a1125"/><circle cx="63" cy="43" r="3.5" fill="#1a1125"/><path d="M36 62Q50 72 64 62" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round"/>'};

var LVS=[{l:1,n:'견습 공주',a:10,x:0},{l:2,n:'절약 공주',a:18,x:500},{l:3,n:'저축 기사',a:28,x:1500},{l:4,n:'투자 마법사',a:40,x:3000},{l:5,n:'자산 여왕',a:55,x:5500},{l:6,n:'전설의 부자',a:75,x:9000}];
function gL(x){for(var i=LVS.length-1;i>=0;i--)if(x>=LVS[i].x)return LVS[i];return LVS[0];}
function nL(x){for(var i=0;i<LVS.length;i++)if(LVS[i].x>x)return LVS[i];return null;}
function xp(){var x=0;for(var p in D){var o=D[p];if(!o||!o.days)continue;for(var d in o.days){if(o.days[d].bt)x+=20;if(o.days[d].rw>0)x+=Math.min(50,Math.round(o.days[d].rw/100));}if(o.mb)x+=200;}return x;}
function iP(){return{inc:{},fix:{},sav:{},days:{},rb:0,mb:false,mr:0};}
function gP(p){if(!D[p])D[p]=iP();return D[p];}
function gDy(p,i){var o=gP(p);if(!o.days[i])o.days[i]={items:[],bt:false,rw:0};return o.days[i];}
function load(){try{var s=localStorage.getItem(SK);if(s)D=JSON.parse(s);else D={};}catch(e){D={};}}
function sv(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){}}
function pI(p){var o=gP(p),t=0;DI.forEach(function(x){t+=Number(o.inc[x.id]||x.v)||0;});return t;}
function pF(p){var o=gP(p),t=0;DF.forEach(function(x){t+=Number(o.fix[x.id]||x.v)||0;});return t;}
function pS(p){var o=gP(p),t=0;DS.forEach(function(x){t+=Number(o.sav[x.id]||x.v)||0;});return t;}
function pB(p){return Math.max(0,pI(p)-pF(p)-pS(p));}
function dB(p){return Math.round(pB(p)/pLen(p));}
function dSp(p,i){return gDy(p,i).items.reduce(function(s,x){return s+x.amount},0);}
function dR(p,i){var tot=pB(p),sp=0,o=gP(p);for(var j=0;j<i;j++)sp+=((o.days[j]||{}).items||[]).reduce(function(s,x){return s+x.amount},0);return Math.max(0,Math.round((tot-sp)/Math.max(1,pLen(p)-i)));}
function pSp(p){var o=gP(p),t=0;for(var d in o.days)t+=((o.days[d]||{}).items||[]).reduce(function(s,x){return s+x.amount},0);return t;}
function pBd(p){var o=gP(p),n=0;for(var d in o.days)if(o.days[d].bt)n++;return n;}
function pCats(p){var o=gP(p),c={};for(var d in o.days)(o.days[d].items||[]).forEach(function(x){c[x.cat]=(c[x.cat]||0)+x.amount;});return c;}
function sMF(t,id,v){gP(S.per)[t][id]=v;sv();R();}
function gMF(t,id,def){var o=gP(S.per);return(o[t]&&o[t][id]!==undefined&&o[t][id]!=='')?o[t][id]:def;}
function cRw(sp,bg){if(sp===0&&bg>0)return Math.round(bg*.08);var s=bg-sp;if(s<=0)return 0;var r=s/bg;if(r>=.5)return Math.round(s*.1);if(r>=.3)return Math.round(s*.07);if(r>=.1)return Math.round(s*.05);return Math.round(s*.03);}
function addI(){var nm=document.getElementById('i_nm').value.trim(),am=Number(document.getElementById('i_am').value.replace(/,/g,''));if(!nm||!am)return;gDy(S.per,S.di).items.push({name:nm,amount:am,cat:catOf(nm),time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});sv();R();}

function chD(delta){var ni=S.di+delta;if(ni<0){S.per=(S.per-1+12)%12;ni=pLen(S.per)-1;}else if(ni>=pLen(S.per)){S.per=(S.per+1)%12;ni=0;}S.di=ni;R();}
function doB(){
  var sp=dSp(S.per,S.di),db=dR(S.per,S.di),lv=gL(xp()),sv2=db-sp,r=db>0?sv2/db:0,hits=[],mon=MONS[(S.per*31+S.di)%MONS.length];
  if(sp===0)hits.push({n:'무지출!',d:lv.a*5,m:'PERFECT 💖',c:true});
  else if(r>=.5)hits.push({n:'대절약!',d:lv.a*3,m:'CRITICAL 💫',c:true});

  else hits.push({n:'초과 지출',d:Math.round(lv.a*.3),m:'WEAK',c:false});
  var cats={};gDy(S.per,S.di).items.forEach(function(x){cats[x.cat]=(cats[x.cat]||0)+x.amount;});
  if(Object.keys(cats).length>=3)hits.push({n:'분산 소비',d:lv.a,m:'BONUS ⭐',c:true});
  S.bat={mon:mon,hp:mon.hp,mhp:mon.hp,hits:hits,shown:[],ph:'ready',shk:false,hn:null,rw:cRw(sp,db)};S.scr='battle';R();}
function exB(){S.bat.ph='fighting';R();var idx=0,b=S.bat;function go(){if(idx>=b.hits.length){b.ph='done';R();return;}var h=b.hits[idx];b.hp=Math.max(0,b.hp-h.d);b.shown.push(h);b.shk=true;b.hn=h.d;R();setTimeout(function(){b.shk=false;b.hn=null;R();},350);idx++;setTimeout(go,750);}setTimeout(go,500);}

    +'<div style="font-size:11px;color:#555a6e;margin-top:6px;line-height:1.6">사용법: 지출 입력 후 업로드 → 상대방이 다운로드<br>Token 만들기: GitHub → Settings → Developer settings → Personal access tokens → Generate (repo 권한 체크)</div></div>';
  h+='<button style="width:100%;margin-top:12px;padding:12px;background:rgba(244,114,182,.08);color:#f472b6;border:1px solid rgba(244,114,182,.12)" onclick="if(confirm(\'전체 초기화?\')){D={};sv();R();}">전체 초기화</button>';return h;}
var GH={};
function loadGH(){try{var s=localStorage.getItem('syul_gh');if(s)GH=JSON.parse(s);else GH={};}catch(e){GH={};}}
function saveGH(){
  GH.user=document.getElementById('gh_user').value.trim();
  GH.repo=document.getElementById('gh_repo').value.trim();
  GH.token=document.getElementById('gh_token').value.trim();
  try{localStorage.setItem('syul_gh',JSON.stringify(GH));}catch(e){}
  alert('GitHub 설정 저장 완료!');R();
}
function ghOK(){return GH.user&&GH.repo&&GH.token;}
function ghURL(){return'https://api.github.com/repos/'+GH.user+'/'+GH.repo+'/contents/data.json';}
function ghHead(){return{'Authorization':'token '+GH.token,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};}

async function uploadGH(){
  if(!ghOK())return alert('GitHub 설정을 먼저 입력해주세요');
  var btn=event.target;btn.textContent='업로드 중...';btn.disabled=true;
  try{
    var sha='';
    try{var r=await fetch(ghURL(),{headers:ghHead()});if(r.ok){var j=await r.json();sha=j.sha;}}catch(e){}
    var body={message:'서율이네 가계부 '+new Date().toLocaleString('ko-KR'),content:btoa(unescape(encodeURIComponent(JSON.stringify(D,null,2))))};
    if(sha)body.sha=sha;
    var r2=await fetch(ghURL(),{method:'PUT',headers:ghHead(),body:JSON.stringify(body)});
    if(r2.ok)alert('업로드 완료! 상대방이 다운로드하면 동기화됩니다.');
    else{var err=await r2.json();alert('업로드 실패: '+(err.message||r2.status));}
  }catch(e){alert('업로드 오류: '+e.message);}
  btn.textContent='📤 업로드 (저장하기)';btn.disabled=false;
}

async function downloadGH(){
  if(!ghOK())return alert('GitHub 설정을 먼저 입력해주세요');
  var btn=event.target;btn.textContent='다운로드 중...';btn.disabled=true;
  try{
    var r=await fetch(ghURL(),{headers:ghHead()});
    if(!r.ok){alert('다운로드 실패: 데이터가 없거나 설정 오류');btn.textContent='📥 다운로드 (불러오기)';btn.disabled=false;return;}
    var j=await r.json();
    var raw=decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    var parsed=JSON.parse(raw);
    if(!confirm('서버 데이터로 덮어씌울까요?')){btn.textContent='📥 다운로드 (불러오기)';btn.disabled=false;return;}
    D=parsed;sv();alert('다운로드 완료!');R();
  }catch(e){alert('다운로드 오류: '+e.message);}
  btn.textContent='📥 다운로드 (불러오기)';btn.disabled=false;
}
loadGH();
function R(){
  var c='';if(S.scr==='battle')c=rBattle();else if(S.scr==='month')c=rMonth();else if(S.scr==='info')c=rInfo();else c=rDaily();
  var tp=todayP();
  c+='<div class="nb"><button class="'+(S.scr==='daily'?'on':'')+'" onclick="S.scr=\'daily\';R()">⚔️ 오늘</button><button class="'+(S.scr==='month'?'on':'')+'" onclick="S.scr=\'month\';R()">📊 월간</button><button onclick="S.per='+tp.p+';S.di='+tp.i+';S.scr=\'daily\';R()" style="background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff;font-weight:700;font-size:12px">TODAY</button><button class="'+(S.scr==='info'?'on':'')+'" onclick="S.scr=\'info\';R()">💡</button></div>';
  document.getElementById('app').innerHTML=c;
  var n=document.getElementById('i_nm');if(n){document.getElementById('i_am').onkeydown=function(e){if(e.key==='Enter')addI();};n.onkeydown=function(e){if(e.key==='Enter')document.getElementById('i_am').focus();};}
}
load();R();
</script>
